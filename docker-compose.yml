services:
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: xdr-elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200 || exit 1"]
      interval: 10s
      retries: 20
      start_period: 60s
    networks:
      - xdr-net

  kibana:
    image: kibana:8.12.0
    container_name: xdr-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - xdr-net

  backend:
    build: ./backend
    container_name: xdr-backend
    environment:
      - ELASTIC_URL=http://elasticsearch:9200
      - ABUSE_API_KEY=${ABUSE_API_KEY}
      - PORT=5000
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5001:5000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - xdr-net

  frontend:
    build: ./frontend
    container_name: xdr-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - xdr-net

volumes:
  es_data:

networks:
  xdr-net:
    driver: bridge
